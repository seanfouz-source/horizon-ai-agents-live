services:
  - type: web
    name: horizon-ai-agents
    runtime: python
    plan: starter
    buildCommand: python -m pip install -e .
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: horizon-ai-agents-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: DATABASE_PATH
        value: /var/data/horizon_agents.db
      - key: EBAY_STORE_URL
        value: https://www.ebay.com/str/exactspec
      - key: EBAY_STORE_BACKUP_URL
        value: https://ebay.us/m/GDmaKw
      - key: EBAY_STORE_SALE_MEDIA_URL
        value: https://raw.githubusercontent.com/seanfouz-source/horizon-ai-agents-live/main/assets/horizon-summer-sale-square.jpg
      - key: EBAY_SELLER_USERNAME
        value: exactspec-electronics
      - key: EBAY_BROWSE_SEARCH_QUERY
        value: " "
      - key: SYNC_EBAY_API_ON_STARTUP
        value: "true"
      - key: SYNC_STORE_PAGE_ON_STARTUP
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: METRICOOL_API_TOKEN
        sync: false
      - key: MANYCHAT_API_TOKEN
        sync: false
      - key: FACEBOOK_PAGE_ACCESS_TOKEN
        sync: false
      - key: FACEBOOK_PAGE_ID
        sync: false
      - key: FACEBOOK_PAGE_NAME
        value: Horizon Wireless
      - key: FACEBOOK_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: EBAY_ACCESS_TOKEN
        sync: false
      - key: EBAY_CLIENT_ID
        sync: false
      - key: EBAY_CLIENT_SECRET
        sync: false
      - key: EBAY_REFRESH_TOKEN
        sync: false
      - key: EBAY_OAUTH_SCOPES
        value: https://api.ebay.com/oauth/api_scope
      - key: METRICOOL_DAILY_POST_LIMIT
        value: "2"
      - key: METRICOOL_MORNING_POST_TIME
        value: "09:00"
      - key: METRICOOL_EVENING_POST_TIME
        value: "18:00"
      - key: METRICOOL_REPOST_COOLDOWN_DAYS
        value: "14"
      - key: WEBHOOK_SHARED_SECRET
        generateValue: true
      - key: REPORT_EMAIL_PROVIDER
        value: gmail
      - key: REPORT_EMAIL_FROM
        value: sean.fouz@gmail.com
      - key: GMAIL_SENDER
        value: sean.fouz@gmail.com
      - key: GMAIL_CLIENT_CREDENTIALS_FILE
        value: /etc/secrets/client_secret_225009040001-55c5hksat2o9pf35emqvprb3kkti746j.apps.googleusercontent.com.json
      - key: GMAIL_REFRESH_TOKEN_CURRENT
        sync: false
  - type: cron
    name: horizon-daily-report-email
    runtime: python
    plan: starter
    buildCommand: python --version
    startCommand: python scripts/post_render_daily_report_email.py
    schedule: "15 5 * * *"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
