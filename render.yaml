services:
  - type: web
    name: horizon-ai-agents
    runtime: python
    plan: starter
    buildCommand: python -m pip install -e .
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: horizon-ai-agents-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: DATABASE_PATH
        value: /var/data/horizon_agents.db
      - key: EBAY_STORE_URL
        value: https://www.ebay.com/str/exactspec
      - key: EBAY_STORE_BACKUP_URL
        value: https://ebay.us/m/GDmaKw
      - key: SYNC_STORE_PAGE_ON_STARTUP
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: METRICOOL_API_TOKEN
        sync: false
      - key: MANYCHAT_API_TOKEN
        sync: false
      - key: WEBHOOK_SHARED_SECRET
        generateValue: true
  - type: cron
    name: horizon-daily-report-email
    runtime: python
    plan: starter
    buildCommand: python -m pip install -e .
    startCommand: python scripts/send_render_daily_report_email.py
    schedule: "10 8 * * *"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: PUBLIC_BASE_URL
        value: https://horizon-ai-agents.onrender.com
      - key: REPORT_EMAIL_TO
        value: sean.fouz@gmail.com,horizonwirelesstx@gmail.com
      - key: REPORT_EMAIL_FROM_NAME
        value: Horizon AI Agents
      - key: METRICOOL_API_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURITY
        value: starttls
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: REPORT_EMAIL_FROM
        sync: false
